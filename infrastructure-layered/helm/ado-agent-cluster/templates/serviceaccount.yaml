{{- range $poolName, $poolConfig := .Values.agentPools }}
{{- if $poolConfig.enabled }}
{{- $agentAuthMode := dig "agentAuth" "mode" "pat" $poolConfig }}
{{- $agentClientId := dig "agentAuth" "clientId" "" $poolConfig }}
{{- $agentTenantId := dig "agentAuth" "tenantId" "" $poolConfig }}
{{- $hasAnnotations := or $.Values.annotations $poolConfig.serviceAccount.roleArn (eq $agentAuthMode "azure_workload") }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ado-agent-cluster.serviceAccountName" (dict "root" $ "serviceAccount" $poolConfig.serviceAccount "poolName" $poolName) }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "ado-agent-cluster.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $poolName }}
  {{- if $hasAnnotations }}
  annotations:
    {{- with $.Values.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if $poolConfig.serviceAccount.roleArn }}
    eks.amazonaws.com/role-arn: {{ $poolConfig.serviceAccount.roleArn | quote }}
    {{- end }}
    {{- if eq $agentAuthMode "azure_workload" }}
    azure.workload.identity/client-id: {{ $agentClientId | quote }}
    {{- if $agentTenantId }}
    azure.workload.identity/tenant-id: {{ $agentTenantId | quote }}
    {{- end }}
    {{- end }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- end }}

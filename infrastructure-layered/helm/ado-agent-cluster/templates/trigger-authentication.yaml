{{- range $poolName, $poolConfig := .Values.agentPools }}
{{- if and $poolConfig.enabled $poolConfig.autoscaling.enabled }}
{{- $kedaAuthMode := dig "kedaAuth" "mode" "pat" $poolConfig }}
{{- $kedaClientId := dig "kedaAuth" "clientId" "" $poolConfig }}
{{- $kedaTenantId := dig "kedaAuth" "tenantId" "" $poolConfig }}
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: {{ include "ado-agent-cluster.triggerAuthName" $poolConfig }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "ado-agent-cluster.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $poolName }}
spec:
  {{- if eq $kedaAuthMode "azure_workload" }}
  podIdentity:
    provider: azure-workload
    {{- if $kedaClientId }}
    identityId: {{ $kedaClientId | quote }}
    {{- end }}
    {{- if $kedaTenantId }}
    identityTenantId: {{ $kedaTenantId | quote }}
    {{- end }}
  {{- else }}
  secretTargetRef:
  - parameter: personalAccessToken
    name: {{ $poolConfig.ado.secretName }}
    key: personalAccessToken
  {{- end }}
{{- end }}
{{- end }}

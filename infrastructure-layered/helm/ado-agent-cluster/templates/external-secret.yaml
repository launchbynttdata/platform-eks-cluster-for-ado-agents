{{- if .Values.externalSecrets.enabled }}
{{- range $secretName, $secretConfig := .Values.externalSecrets.secrets }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secretName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "ado-agent-cluster.labels" $ | nindent 4 }}
    app.kubernetes.io/component: external-secrets
spec:
  refreshInterval: {{ $secretConfig.k8s.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ $.Values.externalSecrets.clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ $secretConfig.k8s.secretName }}
    creationPolicy: Owner
    template:
      type: {{ $secretConfig.k8s.type | default "Opaque" }}
      {{- if $secretConfig.k8s.labels }}
      metadata:
        labels:
          {{- toYaml $secretConfig.k8s.labels | nindent 10 }}
      {{- end }}
  data:
  {{- range $k8sKey, $awsKey := $secretConfig.data }}
  - secretKey: {{ $k8sKey }}
    remoteRef:
      key: {{ $secretConfig.aws.secretName }}
      property: {{ $awsKey }}
  {{- end }}
{{- end }}
{{- end }}
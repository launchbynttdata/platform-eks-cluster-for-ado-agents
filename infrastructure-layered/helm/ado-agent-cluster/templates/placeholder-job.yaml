{{- range $poolName, $poolConfig := .Values.agentPools }}
{{- if and $poolConfig.enabled $poolConfig.autoscaling.enabled $poolConfig.autoscaling.createTemplateAgent }}
{{- if and $poolConfig.autoscaling.jobsToFetch (or $poolConfig.autoscaling.templateAgentName $poolConfig.autoscaling.createTemplateAgent) }}
{{- fail (printf "agentPools.%s.autoscaling.templateAgentName and jobsToFetch are mutually exclusive because KEDA parent matching cannot use jobsToFetch" $poolName) }}
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ado-agent-cluster.placeholderJobName" $poolConfig }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "ado-agent-cluster.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $poolName }}
    app.kubernetes.io/role: ado-agent-placeholder
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- with $.Values.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ $poolConfig.autoscaling.placeholderBackoffLimit }}
  ttlSecondsAfterFinished: {{ $poolConfig.autoscaling.placeholderTtlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "ado-agent-cluster.agentPoolSelectorLabels" (dict "root" $ "poolName" $poolName) | nindent 8 }}
        app.kubernetes.io/role: ado-agent-placeholder
        {{- with $poolConfig.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $poolConfig.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "ado-agent-cluster.serviceAccountName" (dict "root" $ "serviceAccount" $poolConfig.serviceAccount "poolName" $poolName) }}
      automountServiceAccountToken: {{ $.Values.agent.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ $.Values.agent.terminationGracePeriodSeconds }}
      restartPolicy: Never
      {{- with $poolConfig.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $poolConfig.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $poolConfig.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $poolConfig.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: ado-agent-placeholder
        image: "{{ $poolConfig.image.repository }}:{{ $poolConfig.image.tag }}"
        imagePullPolicy: {{ $poolConfig.image.pullPolicy }}
        env:
        - name: AZP_ORG
          {{- if eq ($.Values.auth.mode | default "pat") "spn" }}
          value: {{ $.Values.auth.adoOrg | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ $poolConfig.ado.secretName }}
              key: organization
          {{- end }}
        - name: AZP_URL
          {{- if eq ($.Values.auth.mode | default "pat") "spn" }}
          value: {{ $.Values.auth.adoURL | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ $poolConfig.ado.secretName }}
              key: adourl
          {{- end }}
        {{- if eq ($.Values.auth.mode | default "pat") "spn" }}
        - name: AZP_CLIENTID
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.auth.spnSecretName }}
              key: AZP_CLIENTID
        - name: AZP_CLIENTSECRET
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.auth.spnSecretName }}
              key: AZP_CLIENTSECRET
        - name: AZP_TENANTID
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.auth.spnSecretName }}
              key: AZP_TENANTID
        {{- else }}
        - name: AZP_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $poolConfig.ado.secretName }}
              key: personalAccessToken
        {{- end }}
        - name: AZP_POOL
          value: {{ $poolConfig.ado.poolName | quote }}
        - name: AZP_AGENT_NAME
          value: {{ include "ado-agent-cluster.placeholderAgentName" $poolConfig | quote }}
        - name: AZP_PLACEHOLDER_AGENT
          value: "true"
        - name: AZP_CLEANUP_TIMEOUT_SECONDS
          value: {{ $.Values.agent.cleanupTimeoutSeconds | quote }}
        {{- if $.Values.buildkit.enabled }}
        - name: BUILDKIT_HOST
          value: {{ $.Values.buildkit.endpoint | quote }}
        {{- end }}
        {{- with $poolConfig.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $poolConfig.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $.Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $poolConfig.volumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with $poolConfig.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}

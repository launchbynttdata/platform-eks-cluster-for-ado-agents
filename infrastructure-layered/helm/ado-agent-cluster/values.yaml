# Default values for ado-agent-cluster
# This is a YAML-formatted file.
# Declare variables to be substituted into your templates.

# Global configuration
global:
  # Cluster and namespace information (typically provided by Terraform)
  namespace: ado-agents
  clusterName: ""
  region: us-west-2

# Agent lifecycle controls.
agent:
  runOnce: true
  recyclePodAfterRunOnce: false
  cleanupTimeoutSeconds: 300
  terminationGracePeriodSeconds: 420
  automountServiceAccountToken: true

# Agent pool configurations
# Multiple agent pools can be defined, each with their own configuration
agentPools:
  dev-build:
    enabled: true
    name: "dev-build"
    # ADO Pool configuration
    ado:
      poolName: "example-ado-agent-pool"
      secretName: "ado-pat"
    # Container configuration
    image:
      repository: ""  # Will be set by Terraform from ECR URL
      tag: "latest"
      pullPolicy: Always
    # Service Account (IAM role will be injected by Terraform)
    serviceAccount:
      name: "ado-agent-dev-build"
      roleArn: ""  # Will be set by Terraform
    # Resource configuration
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
    # KEDA autoscaling configuration
    autoscaling:
      enabled: true
      maxReplicas: 10
      pollingInterval: 30
      targetPipelinesQueueLength: 1
      activationTargetPipelinesQueueLength: ""
      jobsToFetch: ""
      fetchUnfinishedJobsOnly: false
      poolID: ""
      templateAgentName: "dev-build-keda-template"
      createTemplateAgent: true
      placeholderBackoffLimit: 1
      placeholderTtlSecondsAfterFinished: 300
      demands: ""
      requireAllDemands: false
      requireAllDemandsAndIgnoreOthers: false
      caseInsensitiveDemandsProcessing: false
      triggerAuthenticationName: ""  # Will be generated from pool name
      backoffLimit: 0
      ttlSecondsAfterFinished: 300
      successfulJobsHistoryLimit: 5
      failedJobsHistoryLimit: 5
    # Node assignment
    tolerations:
      - key: "eks.amazonaws.com/compute-type"
        operator: "Equal"
        value: "fargate"
        effect: "NoSchedule"
    nodeSelector: {}
    affinity: {}
    topologySpreadConstraints: []
    
  iac:
    enabled: true
    name: "iac"
    # ADO Pool configuration  
    ado:
      poolName: "example-ado-iac-pool"
      secretName: "ado-pat"
    # Container configuration
    image:
      repository: ""  # Will be set by Terraform from ECR URL
      tag: "latest"
      pullPolicy: Always
    # Service Account (IAM role will be injected by Terraform)
    serviceAccount:
      name: "ado-iac-agent"
      roleArn: ""  # Will be set by Terraform
    # Resource configuration
    resources:
      requests:
        memory: "2Gi"
        cpu: "1000m"
      limits:
        memory: "4Gi"
        cpu: "2000m"
    # KEDA autoscaling configuration
    autoscaling:
      enabled: true
      maxReplicas: 5
      pollingInterval: 30
      targetPipelinesQueueLength: 1
      activationTargetPipelinesQueueLength: ""
      jobsToFetch: ""
      fetchUnfinishedJobsOnly: false
      poolID: ""
      templateAgentName: "iac-keda-template"
      createTemplateAgent: true
      placeholderBackoffLimit: 1
      placeholderTtlSecondsAfterFinished: 300
      demands: ""
      requireAllDemands: false
      requireAllDemandsAndIgnoreOthers: false
      caseInsensitiveDemandsProcessing: false
      triggerAuthenticationName: ""  # Will be generated from pool name
      backoffLimit: 0
      ttlSecondsAfterFinished: 300
      successfulJobsHistoryLimit: 5
      failedJobsHistoryLimit: 5
    # Node assignment
    tolerations:
      - key: "eks.amazonaws.com/compute-type"
        operator: "Equal"
        value: "fargate"
        effect: "NoSchedule"
    nodeSelector: {}
    affinity: {}
    topologySpreadConstraints: []

# External Secrets configuration (for secret synchronization)
externalSecrets:
  enabled: true
  clusterSecretStoreName: "aws-secrets-manager"  # From middleware layer
  secrets: {}

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/name: ado-agent-cluster
  app.kubernetes.io/instance: ado-agents
  app.kubernetes.io/component: ci-cd
  app.kubernetes.io/part-of: ado-agent-platform

# Additional labels (can be overridden by Terraform)
labels: {}

# Additional annotations (can be overridden by Terraform)
annotations: {}

# Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

# Security Context for containers
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1001
  capabilities:
    drop:
    - ALL

# Buildkit integration (if using cluster buildkit service)
buildkit:
  enabled: true
  endpoint: ""  # Will be set by Terraform from middleware layer output
  # Example: "buildkitd.buildkit-system.svc.cluster.local:1234"

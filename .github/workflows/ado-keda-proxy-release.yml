name: ado-keda-proxy-release

on:
  push:
    tags:
      - "ado-keda-proxy/v*"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/launchbynttdata/platform-eks-cluster-for-ado-agents/ado-keda-proxy

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: |
          version="${GITHUB_REF_NAME#ado-keda-proxy/}"
          clean="${version#v}"
          major="${clean%%.*}"
          minor="$(printf '%s' "${clean}" | awk -F. '{print $1 "." $2}')"
          short_sha="$(git rev-parse --short=12 HEAD)"
          {
            echo "version=${version}"
            echo "clean=${clean}"
            echo "major=${major}"
            echo "minor=${minor}"
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: app/ado-keda-proxy
          file: app/ado-keda-proxy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.clean }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.minor }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}
            ${{ env.IMAGE_NAME }}:sha-${{ steps.version.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.description=Azure DevOps KEDA authentication proxy

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ADO KEDA Proxy ${{ steps.version.outputs.version }}
          body: |
            Published ADO KEDA proxy image:

            `${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}`

            Tags:
            - `${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}`
            - `${{ env.IMAGE_NAME }}:${{ steps.version.outputs.clean }}`
            - `${{ env.IMAGE_NAME }}:${{ steps.version.outputs.minor }}`
            - `${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}`
            - `${{ env.IMAGE_NAME }}:sha-${{ steps.version.outputs.short_sha }}`

            If the GHCR package is not public after first publish, set package visibility to public in the repository package settings.

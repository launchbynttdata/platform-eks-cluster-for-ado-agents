name: ado-keda-proxy-ci

on:
  pull_request:
    paths:
      - "app/ado-keda-proxy/**"
      - "infrastructure-layered/helm/ado-agent-cluster/**"
      - "Makefile"
      - ".tool-versions"
      - "go.work"
      - ".github/workflows/ado-keda-proxy-ci.yml"
  push:
    branches:
      - main
    paths:
      - "app/ado-keda-proxy/**"
      - "infrastructure-layered/helm/ado-agent-cluster/**"
      - "Makefile"
      - ".tool-versions"
      - "go.work"
      - ".github/workflows/ado-keda-proxy-ci.yml"

permissions:
  contents: read

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/ado-keda-proxy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.26.5
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.5

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Vulnerability and static analysis
        working-directory: .
        run: make go-static

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: app/ado-keda-proxy
          file: app/ado-keda-proxy/Dockerfile
          platforms: linux/amd64
          push: false
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=ci
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.description=Azure DevOps KEDA authentication proxy

  helm:
    name: Helm render
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Render PAT mode
        run: helm template ado-agents infrastructure-layered/helm/ado-agent-cluster

      - name: Render SPN proxy mode
        run: |
          cat > /tmp/spn-values.yaml <<'YAML'
          auth:
            mode: spn
            spnSecretName: ado-agent-spn
            adoURL: https://dev.azure.com/example
            adoOrg: example
          adoKedaProxy:
            enabled: true
          YAML
          helm template ado-agents infrastructure-layered/helm/ado-agent-cluster -f /tmp/spn-values.yaml

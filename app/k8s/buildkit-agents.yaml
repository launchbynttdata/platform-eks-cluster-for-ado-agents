---
apiVersion: v1
kind: Namespace
metadata:
  name: build
---
# (Optional) lock down who can talk to buildkitd later with NetworkPolicy
# For now, just create the ServiceAccount to keep identities clear.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: buildkit
  namespace: build
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::742846647113:role/ado-agent-cluster-ado-agent-buildkit-role"
---
# ClusterIP Service for clients (your ADO agents) to reach buildkitd
apiVersion: v1
kind: Service
metadata:
  name: buildkitd
  namespace: build
spec:
  selector:
    app: buildkitd
  ports:
    - name: tcp
      port: 1234
      targetPort: 1234
  type: ClusterIP
